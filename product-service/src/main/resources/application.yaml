server:
  port: 8082

spring:
  application:
    name: product-service

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}

  eureka:
    instances:
      prefer-ip-address: true
    client:
      fetch-registry: true
      service-url:
        defaultZone: http://localhost:8761/eureka

  data:
    mongodb:
      uri: mongodb://localhost:27017/ekartproductdb

#      username: admin
#      password: admin123
#      host: localhost
#      port: 27017
#      database: ekartproductdb
#      authentication-database: admin

#      for local
#      uri: mongodb://127.0.0.1:27017/ekartproductdb

  # Tell Spring what to do with the containers on shutdown
  docker:
    compose:
      enable: true
      lifecycle-management: start-and-stop

jwt:
  secret: ${JWT_SECRET}











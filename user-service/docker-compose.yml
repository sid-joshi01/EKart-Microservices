services:
  user-db:
    image: mysql:8.4
    container_name: ekart-user-db
    ports:
      - "3310:3306"
    environment:
      # Automatically creates the database on startup
      - MYSQL_DATABASE=ekart_usersdb
      # Root password for admin access
      - MYSQL_ROOT_PASSWORD=root
      # Dedicated app user for the Spring Boot service
      - MYSQL_USER=ekart_user
      - MYSQL_PASSWORD=ekart_pass
    volumes:
      - user_mysql_data:/var/lib/mysql



volumes:
  user_mysql_data:


#
#✅ Alternative: Run SQL Directly Inside Docker (No IntelliJ Needed)
#
#This is the safest way:
#
#  docker exec -it ekart-user-db mysql -u root -p
#
#
#Then:
#
#  USE ekart_usersdb;
#  ALTER TABLE ekart_users AUTO_INCREMENT = 100000000000;
#
#
#  Done ✅
